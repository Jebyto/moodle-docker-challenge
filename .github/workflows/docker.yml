name: Docker CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Validate Docker environment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COMPOSE_PROJECT_NAME: moodle_ci_${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create local environment file
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build Moodle runtime image
        run: docker compose build moodle

      - name: Start services
        run: docker compose up -d mysql moodle

      - name: Wait for Moodle container
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T moodle php -v >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for Moodle container... attempt ${attempt}/30"
            sleep 5
          done

          docker compose ps
          docker compose logs --no-color moodle
          exit 1

      - name: Check PHP extensions required by Moodle
        run: |
          docker compose exec -T moodle php -m | grep -i '^curl$'
          docker compose exec -T moodle php -m | grep -i '^gd$'
          docker compose exec -T moodle php -m | grep -i '^intl$'
          docker compose exec -T moodle php -m | grep -i '^mbstring$'
          docker compose exec -T moodle php -m | grep -i '^mysqli$'
          docker compose exec -T moodle php -m | grep -i '^pdo_mysql$'
          docker compose exec -T moodle php -m | grep -i '^soap$'
          docker compose exec -T moodle php -m | grep -i '^zip$'

      - name: Check Moodle and custom plugin files
        run: |
          docker compose exec -T moodle sh -ceu '
            echo "Checking Moodle install CLI..."
            test -f /var/www/moodle/admin/cli/install_database.php ||
              test -f /var/www/moodle/public/admin/cli/install_database.php

            echo "Checking custom plugins..."
            test -f /var/www/moodle/public/local/seeddata/version.php
            test -f /var/www/moodle/public/local/pomodoro/version.php
            test -f /var/www/moodle/public/blocks/pomodoro/version.php
          '

      - name: Show Docker status on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color mysql moodle

      - name: Stop services
        if: always()
        run: docker compose down -v --remove-orphans
